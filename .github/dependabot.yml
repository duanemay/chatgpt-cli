version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: daily
    groups:
      ginkgo-gomega:
        patterns:
          - "github.com/onsi/ginkgo*"
          - "github.com/onsi/gomega"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10